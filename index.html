<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>车载式道路表面状况检测系统</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: #e8ecf0;
        min-height: 100vh;
      }
      .header {
        font-size: 36px;
        text-align: center;
        padding: 30px 20px;
        font-weight: bold;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
      }
      .main-content {
        padding: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .chart-wrapper {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        width: 70%;
        max-width: 1000px;
      }
      .chart-wrapper iframe {
        width: 100%;
        height: 750px;
        border: none;
      }
      @media (max-width: 900px) {
        .chart-wrapper {
          width: 95%;
        }
        .chart-wrapper iframe {
          height: 750px;
        }
        .header {
          font-size: 24px;
        }
      }
    </style>
  </head>

  <body>
    <div class="header">🚗 车载式道路表面状况检测系统</div>

    <div class="main-content">
      <div class="chart-wrapper">
        <iframe
          src="frequency_chart/frequency_chart.html"
          title="ADXL345振动频率数据图表"
        ></iframe>
      </div>

      <div class="chart-wrapper">
        <iframe
          src="gps_chart/gps_chart.html"
          title="GPS定位数据图表"
        ></iframe>
      </div>
    </div>
  </body>
</html>
